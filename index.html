<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Quyosh Tizimi — Kosmik Sayohat</title>
  <style>
/* ============================================================
   QUYOSH TIZIMI — Stillar
   Glassmorphism + ko‘k/binafsha neon + mobil moslashuv
   ============================================================ */

:root{
  --bg:        #05060f;
  --neon:      #4ea8ff;        /* ko‘k neon */
  --neon-2:    #a06bff;        /* binafsha neon */
  --glass:     rgba(16, 20, 40, 0.55);
  --glass-brd: rgba(140, 170, 255, 0.18);
  --text:      #e8edff;
  --text-dim:  #9aa6cc;
}

*{ margin:0; padding:0; box-sizing:border-box; }

html,body{
  height:100%;
  background:#05060f;
  color:var(--text);
  font-family:"Segoe UI", "Helvetica Neue", system-ui, sans-serif;
  overflow:hidden;
  -webkit-tap-highlight-color:transparent;
}

#scene{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  display:block;
}

.hidden{ display:none !important; }

/* ---------- Yuklanish ekrani ---------- */
#loader{
  position:fixed; inset:0; z-index:50;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:22px;
  background:radial-gradient(circle at 50% 50%, #0a1030 0%, #05060f 70%);
  color:var(--text-dim); letter-spacing:.15em; font-size:13px;
}
.loader-core{
  width:54px; height:54px; border-radius:50%;
  border:2px solid rgba(120,150,255,.15);
  border-top-color:var(--neon);
  border-right-color:var(--neon-2);
  animation:spin 1s linear infinite;
  box-shadow:0 0 30px rgba(78,168,255,.5);
}
@keyframes spin{ to{ transform:rotate(360deg); } }

/* ---------- Intro ekrani ---------- */
#intro{
  position:fixed; inset:0; z-index:40;
  display:flex; align-items:center; justify-content:center;
  background:radial-gradient(circle at 50% 40%, rgba(20,28,70,.45), rgba(5,6,15,.85) 70%);
  backdrop-filter:blur(2px);
  opacity:1;
  padding:24px;
  text-align:center;
}
.intro-inner{ max-width:640px; }
.eyebrow{
  color:var(--neon); letter-spacing:.5em; font-size:12px; margin-bottom:18px;
  text-shadow:0 0 16px rgba(78,168,255,.7);
}
#intro h1{
  font-size:clamp(48px, 11vw, 120px);
  font-weight:800; line-height:.92; letter-spacing:.02em;
  filter:drop-shadow(0 0 30px rgba(120,120,255,.35));
}
#intro h1 span{
  display:block;
  background:linear-gradient(120deg,#ffffff 0%, var(--neon) 45%, var(--neon-2) 100%);
  -webkit-background-clip:text; background-clip:text; color:transparent;
}
#intro h1 span:last-child{ font-weight:300; opacity:.9; }
.lead{
  margin:26px auto 34px; max-width:520px;
  color:var(--text-dim); font-size:clamp(14px,2.4vw,17px); line-height:1.7;
}
#startBtn{
  cursor:pointer; border:none; border-radius:100px;
  padding:16px 38px; font-size:16px; font-weight:600; color:#fff;
  background:linear-gradient(120deg, var(--neon), var(--neon-2));
  box-shadow:0 0 40px rgba(100,120,255,.55), inset 0 0 0 1px rgba(255,255,255,.25);
  transition:transform .25s ease, box-shadow .25s ease;
}
#startBtn:hover{ transform:translateY(-3px) scale(1.03);
  box-shadow:0 0 60px rgba(120,140,255,.8), inset 0 0 0 1px rgba(255,255,255,.4); }
.hint-row{
  display:flex; gap:22px; justify-content:center; flex-wrap:wrap;
  margin-top:38px; color:var(--text-dim); font-size:12.5px; letter-spacing:.04em;
}

/* ---------- Glass umumiy ---------- */
.glass{
  background:var(--glass);
  border:1px solid var(--glass-brd);
  backdrop-filter:blur(18px) saturate(140%);
  -webkit-backdrop-filter:blur(18px) saturate(140%);
  box-shadow:0 8px 40px rgba(0,0,0,.45), inset 0 0 0 1px rgba(255,255,255,.04);
}

/* ---------- Yuqori panel ---------- */
#topbar{
  position:fixed; top:18px; left:18px; right:18px; z-index:20;
  display:flex; align-items:center; justify-content:space-between;
  padding:12px 18px; border-radius:16px;
  opacity:1; transition:opacity .4s ease;
}
.brand{ display:flex; align-items:center; gap:10px; font-weight:700; letter-spacing:.22em; font-size:13px; }
.brand .dot{ width:9px; height:9px; border-radius:50%;
  background:var(--neon); box-shadow:0 0 14px var(--neon); }
.controls{ display:flex; gap:10px; }
.icon-btn{
  width:40px; height:40px; border-radius:12px; cursor:pointer;
  background:rgba(255,255,255,.05); color:var(--text);
  border:1px solid var(--glass-brd); font-size:17px;
  transition:.2s; display:flex; align-items:center; justify-content:center;
}
.icon-btn:hover{ background:rgba(78,168,255,.18); box-shadow:0 0 18px rgba(78,168,255,.4); }
.icon-btn.active{ background:rgba(160,107,255,.25); box-shadow:0 0 18px rgba(160,107,255,.5); }

/* Til almashtirgich */
.lang-switch{ display:flex; gap:4px; padding:3px; border-radius:11px;
  background:rgba(255,255,255,.05); border:1px solid var(--glass-brd); }
.lang-btn{
  cursor:pointer; border:none; background:transparent; color:var(--text-dim);
  font-size:11.5px; font-weight:700; letter-spacing:.06em; padding:6px 10px; border-radius:8px;
  transition:.2s;
}
.lang-btn:hover{ color:#fff; }
.lang-btn.active{ color:#fff; background:linear-gradient(120deg, var(--neon), var(--neon-2));
  box-shadow:0 0 14px rgba(100,120,255,.45); }
#introLang{ position:absolute; top:22px; right:22px; }

/* Muallif yozuvi (bosiladigan havola) */
#credit{
  position:fixed; bottom:16px; right:18px; z-index:18;
  font-size:11.5px; letter-spacing:.04em; color:var(--text-dim);
  background:rgba(10,14,30,.5); border:1px solid var(--glass-brd);
  backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
  padding:7px 13px; border-radius:100px; text-decoration:none; cursor:pointer;
  box-shadow:0 4px 20px rgba(0,0,0,.35); transition:.2s;
}
#credit:hover{ color:#fff; border-color:var(--neon); box-shadow:0 0 18px rgba(78,168,255,.4); }
#credit .credit-star{ color:var(--neon); }
body.clean #credit{ display:none; }

/* Intro — sarlavha tagidagi muallif havolasi */
.author-link{
  display:inline-block; margin-top:14px; text-decoration:none;
  color:var(--text); font-size:clamp(15px,2.6vw,19px); font-weight:600; letter-spacing:.04em;
  padding-bottom:3px; position:relative; transition:.25s;
}
.author-link::after{
  content:""; position:absolute; left:50%; right:50%; bottom:0; height:2px;
  background:linear-gradient(90deg,var(--neon),var(--neon-2)); transition:.3s; border-radius:2px;
}
.author-link:hover{ color:#fff; text-shadow:0 0 18px rgba(120,140,255,.6); }
.author-link:hover::after{ left:0; right:0; }

/* Sayohat hikoya matni (subtitr) */
#tourCaption{
  position:fixed; left:50%; bottom:96px; transform:translateX(-50%) translateY(16px);
  z-index:22; width:min(640px, calc(100% - 36px));
  opacity:0; pointer-events:none; transition:transform .5s cubic-bezier(.16,1,.3,1);
}
#tourCaption.show{ opacity:1; transform:translateX(-50%) translateY(0); }
.tc-card{ padding:18px 22px; border-radius:18px; text-align:center; }
.tc-name{
  color:var(--neon); font-size:12px; font-weight:700; letter-spacing:.28em; text-transform:uppercase;
  text-shadow:0 0 14px rgba(78,168,255,.6);
}
.tc-text{ margin-top:8px; font-size:15px; line-height:1.6; color:var(--text); text-wrap:pretty; }
body.clean #tourCaption{ display:none; }

/* Koinot faktlari modali */
.cosmos-overlay{
  position:fixed; inset:0; z-index:45; display:none;
  align-items:center; justify-content:center; padding:24px;
  background:radial-gradient(circle at 50% 45%, rgba(20,28,70,.5), rgba(5,6,15,.86) 70%);
  backdrop-filter:blur(4px);
}
.cosmos-overlay.open{ display:flex; }
.cosmos-card{
  position:relative; max-width:560px; width:100%;
  padding:34px 32px; border-radius:24px; text-align:center;
}
.cosmos-eyebrow{ color:var(--neon); letter-spacing:.6em; font-size:13px; margin-bottom:12px;
  text-shadow:0 0 16px rgba(78,168,255,.7); }
.cosmos-card h2{
  font-size:clamp(24px,5vw,34px); font-weight:800; margin-bottom:22px; line-height:1.15;
  background:linear-gradient(120deg,#fff, var(--neon) 60%, var(--neon-2));
  -webkit-background-clip:text; background-clip:text; color:transparent;
}
.cosmos-card ul{ list-style:none; display:flex; flex-direction:column; gap:12px; text-align:left; }
.cosmos-card li{
  position:relative; padding:13px 15px 13px 42px; border-radius:14px; font-size:14px; line-height:1.55;
  color:var(--text); background:rgba(255,255,255,.04); border:1px solid rgba(140,170,255,.12);
}
.cosmos-card li::before{
  content:"✦"; position:absolute; left:15px; top:13px; color:var(--neon);
  text-shadow:0 0 10px rgba(78,168,255,.8);
}
@keyframes popIn{ from{ opacity:0; transform:scale(.92) translateY(14px); } to{ opacity:1; transform:none; } }

/* Interfeysni yashirish tugmasi (har doim ko‘rinib turadi) */
.ui-toggle{
  position:fixed; bottom:18px; left:18px; z-index:60;
  width:44px; height:44px; border-radius:13px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; font-size:19px;
  color:var(--text); background:var(--glass); border:1px solid var(--glass-brd);
  backdrop-filter:blur(18px) saturate(140%); -webkit-backdrop-filter:blur(18px) saturate(140%);
  box-shadow:0 8px 30px rgba(0,0,0,.45); transition:.2s;
}
.ui-toggle:hover{ background:rgba(78,168,255,.18); box-shadow:0 0 20px rgba(78,168,255,.45); transform:translateY(-2px); }

/* «Toza» (kinematik) rejim — barcha interfeys yashiriladi, faqat tugma qoladi */
body.clean #topbar, body.clean #dock, body.clean #panel{ display:none !important; }

/* ---------- Pastki dock (sayyoralar) ---------- */
#dock{
  position:fixed; bottom:18px; left:50%; transform:translateX(-50%); z-index:20;
  display:flex; gap:6px; padding:8px; border-radius:18px;
  max-width:calc(100% - 36px); overflow-x:auto;
  opacity:1; scrollbar-width:none;
}
#dock::-webkit-scrollbar{ display:none; }
.dock-item{
  flex:0 0 auto; cursor:pointer; border:none; background:transparent;
  color:var(--text-dim); font-size:12px; font-weight:600; letter-spacing:.04em;
  padding:9px 14px; border-radius:12px; transition:.2s; white-space:nowrap;
  display:flex; align-items:center; gap:8px;
}
.dock-item:hover{ color:#fff; background:rgba(255,255,255,.06); }
.dock-item.active{ color:#fff; background:rgba(78,168,255,.2); box-shadow:0 0 16px rgba(78,168,255,.35); }
.dock-swatch{ width:11px; height:11px; border-radius:50%; box-shadow:0 0 8px currentColor; }

/* ---------- O‘ng ma'lumot paneli ---------- */
#panel{
  position:fixed; top:78px; right:18px; z-index:25;
  width:340px; max-width:calc(100% - 36px);
  padding:22px; border-radius:20px;
  transform:translateX(120%); opacity:0; pointer-events:none;
  transition:transform .55s cubic-bezier(.16,1,.3,1), opacity .4s ease;
  max-height:calc(100vh - 100px); overflow-y:auto;
}
#panel.open{ transform:translateX(0); opacity:1; pointer-events:auto; }
#panel::-webkit-scrollbar{ width:6px; }
#panel::-webkit-scrollbar-thumb{ background:rgba(140,170,255,.3); border-radius:6px; }

.panel-close{
  position:absolute; top:16px; right:16px; cursor:pointer;
  width:30px; height:30px; border-radius:9px; border:1px solid var(--glass-brd);
  background:rgba(255,255,255,.05); color:var(--text-dim); font-size:13px; transition:.2s;
}
.panel-close:hover{ color:#fff; background:rgba(255,90,120,.25); }
.panel-head #panelType{
  color:var(--neon); font-size:11px; letter-spacing:.35em; font-weight:600;
  text-shadow:0 0 12px rgba(78,168,255,.6);
}
.panel-head h2{
  font-size:32px; font-weight:800; margin-top:6px; letter-spacing:.01em;
  background:linear-gradient(120deg,#fff, var(--neon-2));
  -webkit-background-clip:text; background-clip:text; color:transparent;
}
.panel-desc{ color:var(--text-dim); font-size:13.5px; line-height:1.65; margin:14px 0 18px; }

.stats{ display:flex; flex-direction:column; gap:14px; }
.sec-title{
  font-size:11px; letter-spacing:.18em; text-transform:uppercase; font-weight:700;
  color:var(--neon); margin:4px 0 -2px; display:flex; align-items:center; gap:8px;
}
.sec-title::after{ content:""; flex:1; height:1px;
  background:linear-gradient(90deg, rgba(140,170,255,.35), transparent); }
.stats-grid{ display:grid; grid-template-columns:1fr 1fr; gap:9px; }
.stat{
  background:rgba(255,255,255,.04); border:1px solid rgba(140,170,255,.1);
  border-radius:13px; padding:11px 12px;
}
.stat .k{ font-size:10.5px; color:var(--text-dim); letter-spacing:.04em; text-transform:uppercase; }
.stat .v{ font-size:14.5px; font-weight:700; margin-top:3px; }
.stat.wide{ grid-column:1 / -1; }

/* Tarkib / atmosfera diagrammasi */
.comp{ display:flex; flex-direction:column; gap:9px; }
.comp-top{ display:flex; justify-content:space-between; font-size:12px; color:var(--text-dim); margin-bottom:4px; }
.comp-top span:last-child{ color:#fff; font-weight:600; }
.comp-bar{ height:7px; border-radius:6px; background:rgba(255,255,255,.07); overflow:hidden; }
.comp-bar i{ display:block; height:100%; border-radius:6px;
  box-shadow:0 0 12px currentColor; transition:width .8s cubic-bezier(.16,1,.3,1); }

/* Panel harakat tugmalari */
.panel-actions{ display:flex; gap:9px; margin:16px 0 4px; }
.pbtn{
  flex:1; cursor:pointer; border-radius:12px; padding:11px 10px;
  font-size:12.5px; font-weight:600; color:var(--text);
  background:rgba(255,255,255,.05); border:1px solid var(--glass-brd);
  transition:.2s; white-space:nowrap;
}
.pbtn:hover{ background:rgba(255,255,255,.1); transform:translateY(-1px); }
.pbtn.primary{
  color:#fff; border:none;
  background:linear-gradient(120deg, var(--neon), var(--neon-2));
  box-shadow:0 0 22px rgba(100,120,255,.45);
}
.pbtn.primary:hover{ box-shadow:0 0 30px rgba(120,140,255,.7); }

/* Tezlik boshqaruvi */
.speed-ctl{ display:flex; align-items:center; gap:9px; padding-right:6px;
  border-right:1px solid var(--glass-brd); margin-right:4px; }
#speedVal{ font-size:12px; font-weight:600; color:var(--text-dim); min-width:34px; text-align:center; }
#speed{
  -webkit-appearance:none; appearance:none; width:96px; height:4px; border-radius:4px;
  background:linear-gradient(90deg, var(--neon), var(--neon-2)); outline:none; cursor:pointer;
}
#speed::-webkit-slider-thumb{
  -webkit-appearance:none; width:15px; height:15px; border-radius:50%;
  background:#fff; box-shadow:0 0 10px var(--neon); cursor:pointer;
}
#speed::-moz-range-thumb{
  width:15px; height:15px; border:none; border-radius:50%;
  background:#fff; box-shadow:0 0 10px var(--neon); cursor:pointer;
}

.fact{
  margin-top:16px; padding:14px 15px; border-radius:14px;
  background:linear-gradient(120deg, rgba(78,168,255,.12), rgba(160,107,255,.12));
  border:1px solid rgba(140,170,255,.18);
}
.fact-label{ color:var(--neon); font-size:11px; font-weight:700; letter-spacing:.08em; }
.fact p{ margin-top:7px; font-size:13px; line-height:1.6; color:var(--text); }

/* Sayyora ustidagi 2D yorliq */
.hover-label{
  position:fixed; z-index:15; pointer-events:none;
  transform:translate(-50%,-140%);
  padding:5px 11px; border-radius:9px; font-size:12px; font-weight:600; letter-spacing:.04em;
  background:rgba(10,14,30,.7); border:1px solid var(--glass-brd);
  backdrop-filter:blur(8px); color:#fff; white-space:nowrap;
  box-shadow:0 0 18px rgba(78,168,255,.25); opacity:0; transition:opacity .15s;
}

@keyframes fadeIn{ from{ opacity:0; } to{ opacity:1; } }

/* ---------- Mobil ---------- */
@media (max-width:680px){
  #panel{
    top:auto; bottom:0; right:0; left:0; width:100%; max-width:100%;
    border-radius:22px 22px 0 0; max-height:64vh;
    transform:translateY(110%); padding:18px 18px 26px;
  }
  #panel.open{ transform:translateY(0); }
  #dock{ bottom:auto; top:70px; }
  #topbar{ top:10px; left:10px; right:10px; padding:8px 12px; }
  .brand{ display:none; }                       /* joy tejash uchun mobilda yashiriladi */
  .controls{ gap:8px; width:100%; justify-content:space-between; }
  .icon-btn{ width:38px; height:38px; font-size:16px; }
  #speed{ width:64px; }
  #speedVal{ display:none; }
  .speed-ctl{ gap:6px; padding-right:6px; margin-right:0; border-right:none; }
  .lang-btn{ padding:6px 8px; font-size:11px; }
  .hint-row{ gap:12px; font-size:11.5px; }
  .panel-head h2{ font-size:26px; }
  .panel-actions{ flex-wrap:wrap; }
  .pbtn.primary{ flex:1 1 100%; }
  .pbtn:not(.primary){ flex:1 1 0; }
  .ui-toggle{ bottom:auto; top:50%; left:10px; transform:translateY(-50%); }
  .ui-toggle:hover{ transform:translateY(-50%); }
  #introLang{ top:14px; right:14px; }
}
@media (max-width:380px){
  #intro h1{ font-size:44px; }
  .eyebrow{ letter-spacing:.32em; }
  .hint-row span:nth-child(2){ display:none; }   /* eng tor ekranda bitta maslahatni yashirish */
}

  <script>
/* ==========================================================================
   QUYOSH TIZIMI — 3D Interaktiv tajriba
   Three.js (r128) yordamida. Barcha teksturalar protsedural (canvas) tarzda
   generatsiya qilinadi — internet rasmlariga bog‘liq emas, offlayn ishlaydi.
   ========================================================================== */

(() => {
'use strict';

/* --------------------------------------------------------------------------
   0. ASOSIY O‘RNATISH (renderer, sahna, kamera, boshqaruv)
   -------------------------------------------------------------------------- */
const canvas   = document.getElementById('scene');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true, powerPreference:'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputEncoding   = THREE.sRGBEncoding;
renderer.toneMapping      = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;

const scene = new THREE.Scene();
// Fon mutlaqo qora emas — chuqur ko‘k-binafsha kosmos tusi
scene.background = new THREE.Color(0x05060f);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.1, 8000);
camera.position.set(0, 90, 320);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping  = true;     // silliq harakat
controls.dampingFactor  = 0.06;
controls.rotateSpeed     = 0.55;
controls.zoomSpeed       = 0.9;
controls.minDistance     = 14;
controls.maxDistance     = 3400;   // galaktikalargacha uzoqlashish mumkin
controls.target.set(0, 0, 0);

const clock = new THREE.Clock();

/* --------------------------------------------------------------------------
   I18N — til holati (UZ / RU / EN) va yordamchilar
   -------------------------------------------------------------------------- */
let LANG = localStorage.getItem('solar_lang') || 'uz';
if(!window.LOC[LANG]) LANG = 'uz';
const tUI = (k) => (window.LOC[LANG].ui[k] ?? k);
const bodyData = (key) => window.LOC[LANG].bodies[key];
let lastSelectedKey = null;   // panel ochilganda qaysi obyekt

/* --------------------------------------------------------------------------
   1. PROTSEDURAL TEKSTURA GENERATORLARI
   -------------------------------------------------------------------------- */
function makeCanvas(w, h){
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  return c;
}
function asTexture(canvas, srgb = true){
  const t = new THREE.CanvasTexture(canvas);
  t.anisotropy = renderer.capabilities.getMaxAnisotropy();
  if (srgb) t.encoding = THREE.sRGBEncoding;
  return t;
}
// fBm-ga o‘xshash shovqin: ko‘p qatlamli yarim shaffof dog‘lar
function speckle(ctx, w, h, count, colorFn, rMin, rMax){
  for (let i=0;i<count;i++){
    const x = Math.random()*w, y = Math.random()*h;
    const r = rMin + Math.random()*(rMax-rMin);
    ctx.fillStyle = colorFn();
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fill();
  }
}

// Toshli sayyora (Merkuriy, Venera, Mars) uchun umumiy generator
function rockyTexture(base, shades, craterCount){
  const w=1024, h=512, c=makeCanvas(w,h), ctx=c.getContext('2d');
  ctx.fillStyle = base; ctx.fillRect(0,0,w,h);
  // rang variatsiyasi
  shades.forEach(s=>{
    ctx.globalAlpha = 0.5;
    speckle(ctx, w, h, 260, ()=>s, 6, 40);
  });
  ctx.globalAlpha = 0.25;
  speckle(ctx, w, h, 2000, ()=>'rgba(0,0,0,0.4)', 1, 4);
  // kraterlar
  ctx.globalAlpha = 1;
  for (let i=0;i<craterCount;i++){
    const x=Math.random()*w, y=Math.random()*h, r=3+Math.random()*16;
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle='rgba(0,0,0,0.28)'; ctx.fill();
    ctx.beginPath(); ctx.arc(x-r*0.25,y-r*0.25,r*0.7,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.10)'; ctx.fill();
  }
  return asTexture(c);
}

// Gaz giganti (Yupiter, Saturn, Uran, Neptun) — gorizontal chiziqlar
function gasGiantTexture(bands, opts={}){
  const w=1024, h=512, c=makeCanvas(w,h), ctx=c.getContext('2d');
  let y=0;
  const total = bands.reduce((s,b)=>s+(b.size||1),0);
  bands.forEach(b=>{
    const bh = h*(b.size||1)/total;
    const g = ctx.createLinearGradient(0,y,0,y+bh);
    g.addColorStop(0, b.c1); g.addColorStop(1, b.c2 || b.c1);
    ctx.fillStyle=g; ctx.fillRect(0,y,w,bh);
    // turbulentlik — gorizontal cho‘zilgan dog‘lar
    ctx.globalAlpha=0.18;
    for(let i=0;i<40;i++){
      ctx.fillStyle = Math.random()>0.5 ? '#ffffff' : '#000000';
      const ex=Math.random()*w, ey=y+Math.random()*bh;
      ctx.beginPath();
      ctx.ellipse(ex,ey, 20+Math.random()*70, 2+Math.random()*5, 0, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha=1;
    y+=bh;
  });
  // Yupiterning Katta Qizil Dog‘i
  if (opts.redSpot){
    ctx.save();
    ctx.translate(w*0.72, h*0.62);
    ctx.scale(1.6,1);
    const g = ctx.createRadialGradient(0,0,2, 0,0,60);
    g.addColorStop(0,'#e8643a'); g.addColorStop(0.6,'#c4452a'); g.addColorStop(1,'rgba(160,60,40,0)');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(0,0,60,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
  return asTexture(c);
}

// Qit'a maskasi — Yer kunduzi/kechasi uchun
function continentMask(w,h){
  const c=makeCanvas(w,h), ctx=c.getContext('2d');
  ctx.fillStyle='#000'; ctx.fillRect(0,0,w,h);
  ctx.fillStyle='#fff';
  // tasodifiy "qit'a" blob-lari
  for(let i=0;i<14;i++){
    const cx=Math.random()*w, cy=h*0.25+Math.random()*h*0.5;
    const pts=8+Math.floor(Math.random()*5);
    ctx.beginPath();
    for(let p=0;p<pts;p++){
      const a=p/pts*Math.PI*2;
      const rad=(30+Math.random()*90);
      const x=cx+Math.cos(a)*rad*(1.4), y=cy+Math.sin(a)*rad;
      p? ctx.lineTo(x,y) : ctx.moveTo(x,y);
    }
    ctx.closePath(); ctx.fill();
  }
  return c;
}

let earthMask = null;
function earthDayTexture(){
  const w=1024,h=512,c=makeCanvas(w,h),ctx=c.getContext('2d');
  // okean
  const og=ctx.createLinearGradient(0,0,0,h);
  og.addColorStop(0,'#0a2a5e'); og.addColorStop(.5,'#0e4b8a'); og.addColorStop(1,'#0a2a5e');
  ctx.fillStyle=og; ctx.fillRect(0,0,w,h);
  // qit'alar
  if(!earthMask) earthMask = continentMask(w,h);
  const mctx = earthMask.getContext('2d');
  const data = mctx.getImageData(0,0,w,h).data;
  const land = ctx.getImageData(0,0,w,h);
  for(let i=0;i<data.length;i+=4){
    if(data[i]>128){
      // o‘simlik yoki cho‘l
      const desert = Math.random()>0.65;
      land.data[i]   = desert?150:42;
      land.data[i+1] = desert?125:110;
      land.data[i+2] = desert?70:48;
    }
  }
  ctx.putImageData(land,0,0);
  // qutb muzliklari
  ctx.fillStyle='rgba(240,248,255,0.9)';
  ctx.fillRect(0,0,w,h*0.06); ctx.fillRect(0,h*0.94,w,h*0.06);
  ctx.globalAlpha=0.5; speckle(ctx,w,h,1500,()=>'rgba(255,255,255,0.06)',1,3); ctx.globalAlpha=1;
  return asTexture(c);
}
function earthNightTexture(){
  const w=1024,h=512,c=makeCanvas(w,h),ctx=c.getContext('2d');
  ctx.fillStyle='#01030a'; ctx.fillRect(0,0,w,h);
  if(!earthMask) earthMask = continentMask(w,h);
  const data = earthMask.getContext('2d').getImageData(0,0,w,h).data;
  // qit'alar ustida shahar chiroqlari
  for(let i=0;i<26000;i++){
    const x=Math.floor(Math.random()*w), y=Math.floor(Math.random()*h);
    const idx=(y*w+x)*4;
    if(data[idx]>128 && y>h*0.08 && y<h*0.92){
      const b=Math.random();
      ctx.fillStyle = b>0.85 ? 'rgba(255,240,190,0.95)' : 'rgba(255,205,120,0.6)';
      ctx.fillRect(x,y,1,1);
    }
  }
  return asTexture(c);
}
function cloudTexture(){
  const w=1024,h=512,c=makeCanvas(w,h),ctx=c.getContext('2d');
  ctx.clearRect(0,0,w,h);
  for(let i=0;i<120;i++){
    const x=Math.random()*w, y=Math.random()*h, r=20+Math.random()*70;
    const g=ctx.createRadialGradient(x,y,0,x,y,r);
    g.addColorStop(0,'rgba(255,255,255,'+(0.5+Math.random()*0.4)+')');
    g.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
  }
  return asTexture(c, false);
}

// Saturn halqalari — radial tekstura (alfa kanali bilan)
function ringTexture(){
  const sz=1024, c=makeCanvas(sz,sz), ctx=c.getContext('2d');
  ctx.clearRect(0,0,sz,sz);
  const cx=sz/2, cy=sz/2;
  for(let r=sz*0.30; r<sz*0.5; r+=1){
    const t=(r-sz*0.30)/(sz*0.2);
    // bo‘shliqlar (Cassini) va zichlik o‘zgarishi
    let a = 0.55 + 0.35*Math.sin(r*0.4) + (Math.random()*0.1);
    if(t>0.45 && t<0.5) a*=0.15;          // Cassini bo‘shlig‘i
    if(t<0.05) a*=0.3;
    a = Math.max(0, Math.min(0.9, a));
    const shade = 180 + Math.floor(40*Math.sin(r*0.2));
    ctx.strokeStyle=`rgba(${shade},${shade-25},${shade-70},${a})`;
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.stroke();
  }
  return asTexture(c, false);
}

// Yumshoq dumaloq nuqta (yulduz/zarra sprite-i)
function dotTexture(){
  const s=64,c=makeCanvas(s,s),ctx=c.getContext('2d');
  const g=ctx.createRadialGradient(s/2,s/2,0,s/2,s/2,s/2);
  g.addColorStop(0,'rgba(255,255,255,1)');
  g.addColorStop(0.2,'rgba(255,255,255,0.8)');
  g.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=g; ctx.fillRect(0,0,s,s);
  return asTexture(c,false);
}
const SPRITE = dotTexture();

// Tumanlik (nebula) bulutli teksturasi
function nebulaTexture(tint){
  const s=512,c=makeCanvas(s,s),ctx=c.getContext('2d');
  ctx.clearRect(0,0,s,s);
  for(let i=0;i<60;i++){
    const x=Math.random()*s,y=Math.random()*s,r=40+Math.random()*150;
    const g=ctx.createRadialGradient(x,y,0,x,y,r);
    g.addColorStop(0,tint.replace('A', (0.05+Math.random()*0.12).toFixed(2)));
    g.addColorStop(1,tint.replace('A','0'));
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
  }
  // chetlarini yo‘qqa chiqaruvchi radial niqob (kvadrat ko‘rinmasligi uchun)
  ctx.globalCompositeOperation='destination-in';
  const vg=ctx.createRadialGradient(s/2,s/2,0,s/2,s/2,s/2);
  vg.addColorStop(0,'rgba(0,0,0,1)'); vg.addColorStop(0.65,'rgba(0,0,0,0.9)');
  vg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=vg; ctx.fillRect(0,0,s,s);
  ctx.globalCompositeOperation='source-over';
  return asTexture(c,false);
}

/* --------------------------------------------------------------------------
   2. YULDUZLAR, TUMANLIKLAR, GALAKTIKALAR, KOSMIK CHANG
   -------------------------------------------------------------------------- */
function buildStarLayer(count, radius, size, opacity){
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(count*3);
  const col = new Float32Array(count*3);
  const palette = [
    [1,1,1],[0.8,0.85,1],[1,0.9,0.75],[0.7,0.8,1],[1,0.8,0.7]
  ];
  for(let i=0;i<count;i++){
    // sferada teng taqsimot
    const u=Math.random(), v=Math.random();
    const theta=2*Math.PI*u, phi=Math.acos(2*v-1);
    const r=radius*(0.7+Math.random()*0.3);
    pos[i*3]  =r*Math.sin(phi)*Math.cos(theta);
    pos[i*3+1]=r*Math.sin(phi)*Math.sin(theta);
    pos[i*3+2]=r*Math.cos(phi);
    const cc=palette[Math.floor(Math.random()*palette.length)];
    const b=0.6+Math.random()*0.4;
    col[i*3]=cc[0]*b; col[i*3+1]=cc[1]*b; col[i*3+2]=cc[2]*b;
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos,3));
  geo.setAttribute('color', new THREE.BufferAttribute(col,3));
  const mat = new THREE.PointsMaterial({
    size, map:SPRITE, vertexColors:true, transparent:true, opacity,
    depthWrite:false, blending:THREE.AdditiveBlending, sizeAttenuation:true
  });
  return new THREE.Points(geo, mat);
}
// Parallaks uchun ikki qatlam (turli tezlikda aylanadi)
const starsFar  = buildStarLayer(6000, 3000, 6, 0.9);
const starsNear = buildStarLayer(3000, 1800, 9, 0.8);
scene.add(starsFar, starsNear);

// Tumanliklar (nebula) — katta shaffof tekisliklar
const nebulaGroup = new THREE.Group();
const nebTints = ['rgba(90,120,255,A)','rgba(160,80,220,A)','rgba(60,180,200,A)','rgba(220,90,160,A)'];
for(let i=0;i<8;i++){
  const tex = nebulaTexture(nebTints[i%nebTints.length]);
  const mat = new THREE.SpriteMaterial({ map:tex, transparent:true, opacity:0.55,
    blending:THREE.AdditiveBlending, depthWrite:false });
  const sp = new THREE.Sprite(mat);
  const d=1400+Math.random()*1200;
  const a=Math.random()*Math.PI*2, b=(Math.random()-0.5)*1.2;
  sp.position.set(Math.cos(a)*d, b*d*0.5, Math.sin(a)*d);
  const s=500+Math.random()*700; sp.scale.set(s,s,1);
  nebulaGroup.add(sp);
}
scene.add(nebulaGroup);

// Uzoq galaktikalar — spiral his beruvchi sprite-lar
function galaxyTexture(){
  const s=256,c=makeCanvas(s,s),ctx=c.getContext('2d');
  ctx.clearRect(0,0,s,s); ctx.translate(s/2,s/2);
  for(let arm=0;arm<2;arm++){
    for(let i=0;i<400;i++){
      const t=i/400, ang=arm*Math.PI + t*6, rad=t*s*0.45;
      const x=Math.cos(ang)*rad, y=Math.sin(ang)*rad*0.5;
      ctx.fillStyle=`rgba(${200+Math.random()*55},${190+Math.random()*40},255,${0.4*(1-t)})`;

const SUN_RADIUS = 14;
// 3D simplex shovqin (Ashima) — quyosh yuzasi uchun
const NOISE_GLSL = `
vec3 mod289(vec3 x){return x-floor(x*(1.0/289.0))*289.0;}
vec4 mod289(vec4 x){return x-floor(x*(1.0/289.0))*289.0;}
vec4 permute(vec4 x){return mod289(((x*34.0)+1.0)*x);}
vec4 taylorInvSqrt(vec4 r){return 1.79284291400159-0.85373472095314*r;}
float snoise(vec3 v){
  const vec2 C=vec2(1.0/6.0,1.0/3.0); const vec4 D=vec4(0.0,0.5,1.0,2.0);
  vec3 i=floor(v+dot(v,C.yyy)); vec3 x0=v-i+dot(i,C.xxx);
  vec3 g=step(x0.yzx,x0.xyz); vec3 l=1.0-g; vec3 i1=min(g.xyz,l.zxy); vec3 i2=max(g.xyz,l.zxy);
  vec3 x1=x0-i1+C.xxx; vec3 x2=x0-i2+C.yyy; vec3 x3=x0-D.yyy;
  i=mod289(i);
  vec4 p=permute(permute(permute(i.z+vec4(0.0,i1.z,i2.z,1.0))+i.y+vec4(0.0,i1.y,i2.y,1.0))+i.x+vec4(0.0,i1.x,i2.x,1.0));
  float n_=0.142857142857; vec3 ns=n_*D.wyz-D.xzx;
  vec4 j=p-49.0*floor(p*ns.z*ns.z);
  vec4 x_=floor(j*ns.z); vec4 y_=floor(j-7.0*x_);
  vec4 x=x_*ns.x+ns.yyyy; vec4 y=y_*ns.x+ns.yyyy; vec4 h=1.0-abs(x)-abs(y);
  vec4 b0=vec4(x.xy,y.xy); vec4 b1=vec4(x.zw,y.zw);
  vec4 s0=floor(b0)*2.0+1.0; vec4 s1=floor(b1)*2.0+1.0; vec4 sh=-step(h,vec4(0.0));
  vec4 a0=b0.xzyw+s0.xzyw*sh.xxyy; vec4 a1=b1.xzyw+s1.xzyw*sh.zzww;
  vec3 p0=vec3(a0.xy,h.x); vec3 p1=vec3(a0.zw,h.y); vec3 p2=vec3(a1.xy,h.z); vec3 p3=vec3(a1.zw,h.w);
  vec4 norm=taylorInvSqrt(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));
  p0*=norm.x; p1*=norm.y; p2*=norm.z; p3*=norm.w;
  vec4 m=max(0.6-vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)),0.0); m=m*m;
  return 42.0*dot(m*m,vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));
}
float fbm(vec3 p){ float v=0.0,a=0.5; for(int i=0;i<5;i++){ v+=a*snoise(p); p*=2.0; a*=0.5;} return v;}
`;
const sunMat = new THREE.ShaderMaterial({

    varying vec3 vPos;
    void main(){ vPos=position; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
  fragmentShader: NOISE_GLSL + `
    uniform float time; varying vec3 vPos;
    void main(){
      vec3 p=normalize(vPos)*2.2;
      float n=fbm(p+vec3(0.0,0.0,time*0.12));
      float n2=fbm(p*3.0-vec3(time*0.18));
      float v=n*0.6+n2*0.4;

    }`
});

function makeOrbitRing(radius){
  const seg=180, pts=[];
  for(let i=0;i<=seg;i++){ const a=i/seg*Math.PI*2; pts.push(new THREE.Vector3(Math.cos(a)*radius,0,Math.sin(a)*radius)); }
  const g=new THREE.BufferGeometry().setFromPoints(pts);
  const m=new THREE.LineBasicMaterial({ color:0x4a5b8a, transparent:true, opacity:0.28 });
  return new THREE.LineLoop(g,m);
}

      sp.rotation.x = (Math.random()-0.5)*1.6;
      sp.rotation.z = (Math.random()-0.5)*1.6;
      mesh.add(sp);
      const sat = makeSatellite(0.5+Math.random()*0.5);
      sat.position.x = p.radius*(1.45+Math.random()*0.9);
      sat.rotation.y = Math.random()*Math.PI;
      sp.add(sat);
      // orbita izi (ingichka halqa)
      const trailR = sat.position.x;
      const tg=[]; for(let k=0;k<=64;k++){ const a=k/64*Math.PI*2; tg.push(new THREE.Vector3(Math.cos(a)*trailR,0,Math.sin(a)*trailR)); }
      const trail=new THREE.LineLoop(new THREE.BufferGeometry().setFromPoints(tg),
        new THREE.LineBasicMaterial({ color:0x6fa8ff, transparent:true, opacity:0.16 }));
      sp.add(trail);
      rec.extras.sats.push({ pivot:sp, speed:0.4+Math.random()*0.9, satMesh:sat, spin:0.5+Math.random() });
    }
  }

  if (p.special==='saturn' || p.key==='uranus'){
    // Halqalar (Saturn to‘liq, Uran ingichka)
    const inner = p.radius*1.4, outer = p.radius*(p.key==='uranus'?1.9:2.4);
    const rg = new THREE.RingGeometry(inner, outer, 96);
    // UV ni radial qilib moslash
    const pos=rg.attributes.position; const uv=rg.attributes.uv; const v3=new THREE.Vector3();
    for(let i=0;i<pos.count;i++){ v3.fromBufferAttribute(pos,i);
      const t=(v3.length()-inner)/(outer-inner); uv.setXY(i, t, 0.5); }
    const ringMat = new THREE.MeshBasicMaterial({ map:ringTexture(), side:THREE.DoubleSide,
      transparent:true, opacity:p.key==='uranus'?0.5:0.95, depthWrite:false });
    const ring = new THREE.Mesh(rg, ringMat);
    ring.rotation.x = Math.PI/2;
    if(p.key==='uranus') ring.rotation.y = THREE.MathUtils.degToRad(0); // o‘q qiyaligini meshdan oladi
    mesh.add(ring);
    rec.extras.ring = ring;
  }

  // Atmosfera / haze halqasi (Yerda o‘ziniki bor)
  if(p.special!=='earth'){
    const gas = (p.key==='jupiter'||p.key==='saturn'||p.key==='uranus'||p.key==='neptune'||p.key==='venus');
    addHaze(mesh, p.radius, p.color, gas?3.0:4.5, gas?1.14:1.06);
  }

  orbitObjects.push(rec);
});

function easeInOut(t){ return t<0.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2; }

// Panel ochiq bo‘lganda sayyora ekran o‘rtasida emas, yon (yoki tepa) tarafga suriladi
function focusTarget(planetPos){
  const out = planetPos.clone();
  if(!panel.classList.contains('open')) return out;
  const dist = camera.position.distanceTo(planetPos);
  const fwd = new THREE.Vector3(); camera.getWorldDirection(fwd);
  const rightV = new THREE.Vector3().crossVectors(fwd, camera.up).normalize();
  if(window.innerWidth <= 680){
    // mobil: panel pastda → sayyorani yuqoriroqqa (target pastga)
    const upV = new THREE.Vector3().crossVectors(rightV, fwd).normalize();
    out.addScaledVector(upV, -dist*0.26);
  } else {
    // desktop: panel o‘ngda → sayyorani chaproqqa (target o‘ngga)
    out.addScaledVector(rightV, dist*0.34);
  }
  return out;
}

function flyTo(rec){
  // Sayyoraga nisbatan BARQAROR ofset — kamera faqat shu sayyoraga yaqinlashadi,
  // Quyoshga intilmaydi va sayyora bilan birga harakatlanadi.
  const planetPos = new THREE.Vector3(); rec.mesh.getWorldPosition(planetPos);
  const radius = rec.radius || SUN_RADIUS;
  const dist = radius*5 + 8;
  const dir = new THREE.Vector3().subVectors(camera.position, planetPos).normalize();
  const offset = dir.multiplyScalar(dist); offset.y += radius*1.5;
  flight = { fromCam: camera.position.clone(), fromTgt: controls.target.clone(),
    offset, rec, t:0, dur:1.8 };
  focusRec = null;
}

const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();
let downXY = null;

renderer.domElement.addEventListener('pointerdown', e=>{ downXY=[e.clientX,e.clientY]; });
renderer.domElement.addEventListener('pointerup', e=>{
  if(!downXY) return;
  const moved = Math.hypot(e.clientX-downXY[0], e.clientY-downXY[1]);
  downXY=null;
  if(moved>6) return; // bu drag edi, bosish emas
  pointer.x = (e.clientX/window.innerWidth)*2-1;
  pointer.y = -(e.clientY/window.innerHeight)*2+1;
  raycaster.setFromCamera(pointer, camera);
  const hits = raycaster.intersectObjects([sun, ...planetMeshes], false);
  if(hits.length){
    const obj = hits[0].object;
    playClick(880);
    if(tourActive) stopTour(false);   // qo‘lda bosilsa tur to‘xtaydi
    if(obj===sun){ selectBody(sun.userData); flightToSun(); }
    else {
      const rec = orbitObjects.find(r=>r.mesh===obj);
      if(rec){ selectBody(rec); flyTo(rec); }
    }
  }
});

  const offset = new THREE.Vector3(0, SUN_RADIUS*2, SUN_RADIUS*6);
  flight={ fromCam:camera.position.clone(), fromTgt:controls.target.clone(),

  focusRec=null;
}

let audioCtx = null;
function ensureAudio(){
  if(!audioCtx){
    try{ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ audioCtx=null; }
  }
  if(audioCtx && audioCtx.state==='suspended') audioCtx.resume();
}
function playClick(freq=820){
  ensureAudio(); if(!audioCtx) return;
  const t = audioCtx.currentTime;
  const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
  o.type='sine';
  o.frequency.setValueAtTime(freq, t);
  o.frequency.exponentialRampToValueAtTime(freq*0.55, t+0.13);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(0.16, t+0.008);
  g.gain.exponentialRampToValueAtTime(0.0001, t+0.18);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(t); o.stop(t+0.2);
}

/* --------------------------------------------------------------------------
   13. ANIMATSIYA SILVASI
   -------------------------------------------------------------------------- */
const sunWorld = new THREE.Vector3();
let simSpeed = 1;       // aylanish tezligi koeffitsienti (0 = to‘xtagan)
let lastSpeed = 1;      // pauzadan keyin tiklash uchun
let simTime = 0;        // simulyatsiya vaqti (pauzada to‘xtaydi)
function animate(){
  requestAnimationFrame(animate);
  const dt  = Math.min(clock.getDelta(), 0.05);
  const sdt = dt * simSpeed;     // tezlikka bog‘liq vaqt qadami
  simTime  += sdt;

  // Quyosh shader vaqti + korona pulsatsiyasi (pauzada to‘xtaydi)
  sunMat.uniforms.time.value = simTime;
  const pulse = 1 + Math.sin(simTime*1.5)*0.04;
  corona.scale.set(SUN_RADIUS*7*pulse, SUN_RADIUS*7*pulse, 1);
  sun.rotation.y += sdt*0.05;

  // Sayyoralar: orbita + o‘z o‘qi atrofida aylanish
  orbitObjects.forEach(rec=>{
    rec.pivot.rotation.y += rec.speed * sdt * 12;
    rec.mesh.rotation.y  += rec.spin  * sdt * 60;
    if(rec.extras.clouds)   rec.extras.clouds.rotation.y += sdt*0.06;
    if(rec.extras.moonPivot)rec.extras.moonPivot.rotation.y += sdt*0.7;
    if(rec.extras.sats) rec.extras.sats.forEach(s=>{
      s.pivot.rotation.y += s.speed * sdt;
      s.satMesh.rotation.y += s.spin * sdt;
    });
    // Yer shaderiga Quyosh yo‘nalishini berish
    if(rec.special==='earth'){
      rec.mesh.getWorldPosition(tmpV);
      sun.getWorldPosition(sunWorld);
      const dir=new THREE.Vector3().subVectors(sunWorld,tmpV).normalize();
      rec.mesh.material.uniforms.sunDir.value.copy(dir);
    }
  });

  // Asteroidlar kamari sekin aylanadi
  beltGroup.rotation.y += sdt*0.02;

  // Kometalar elliptik orbitada
  comets.forEach(c=>{
    c.t += sdt*c.speed;
    const x=Math.cos(c.t)*c.ra, z=Math.sin(c.t)*c.rb, y=Math.sin(c.t)*c.inc*60;
    c.g.position.set(x,y,z);
    // dum Quyoshdan teskari yo‘nalishga qaraydi
    const away=c.g.position.clone().normalize();
    c.tail.position.copy(away.multiplyScalar(23));
  });

  // Parallaks: yulduz qatlamlari turli tezlikda aylanadi
  starsFar.rotation.y  += sdt*0.004;
  starsNear.rotation.y -= sdt*0.006;
  nebulaGroup.rotation.y += sdt*0.002;
  dust.rotation.y += sdt*0.01;

  // Kamera uchish animatsiyasi
  if(flight){
    flight.t += dt/flight.dur;
    const k = easeInOut(Math.min(flight.t,1));
    if(flight.rec){
      // Sayyora/Quyoshga nisbatan barqaror ofset — joriy pozitsiyani kuzatadi
      if(flight.rec==='sun') tmpV.set(0,0,0);
      else flight.rec.mesh.getWorldPosition(tmpV);
      const camTarget = tmpV.clone().add(flight.offset);
      camera.position.lerpVectors(flight.fromCam, camTarget, k);
      controls.target.lerpVectors(flight.fromTgt, focusTarget(tmpV), k);
    } else {
      // Umumiy ko‘rinishga qaytish (qat'iy nuqtaga)
      camera.position.lerpVectors(flight.fromCam, flight.toCamFixed, k);
      controls.target.lerpVectors(flight.fromTgt, flight.toTgtFixed, k);
    }
    if(flight.t>=1){
      if(flight.rec && flight.rec!=='sun'){
        focusRec=flight.rec;
        focusRec.mesh.getWorldPosition(focusPrev);
      }
      flight=null;
    }
  } else if(focusRec){
    // Sayyora bilan birga harakatlanish — kamera u bilan suriladi, atrofida aylanish mumkin
    focusRec.mesh.getWorldPosition(tmpV);
    camera.position.add(tmpV.clone().sub(focusPrev));   // sayyora siljishini kamera ham takrorlaydi
    focusPrev.copy(tmpV);
    controls.target.copy(focusTarget(tmpV));
  }

  controls.update();
  renderer.render(scene, camera);
}
animate();

/* --------------------------------------------------------------------------
   14. RESPONSIVE
   -------------------------------------------------------------------------- */
window.addEventListener('resize', ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

})();

</script>
